# ============================================================================
# STALE ISSUES AND PULL REQUESTS CLEANUP
# ============================================================================
# This workflow automatically marks issues and PRs as "stale" when they have
# been inactive for a while, and closes them if there's no further response.
#
# Configured policy:
#   - Issues:  labeled as stale after 60 days of inactivity
#   - PRs:     labeled as stale after 30 days of inactivity
#   - Closure: 7 additional days without activity after being labeled
#
# Exceptions (never marked as stale):
#   - Issues/PRs with labels: pinned, security, in-progress
#
# The workflow runs once a day (midnight UTC) and can also be triggered
# manually from the "Actions" tab.
# ============================================================================

name: "Stale Issues and PRs"

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "Mark and close inactive issues/PRs"
    runs-on: ubuntu-latest
    steps:
      - name: "Process inactive items"
        uses: actions/stale@v9
        with:
          # ── Issues ──────────────────────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: >
            👋 This issue has been inactive for 60 days and has been marked as stale.
            If it's still relevant, please leave a comment or remove the `stale` label.
            Otherwise, it will be automatically closed in 7 days.
          close-issue-message: >
            🔒 This issue was automatically closed due to inactivity.
            If the problem persists, feel free to reopen it with updated information.

          # ── Pull Requests ────────────────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            👋 This PR has been inactive for 30 days and has been marked as stale.
            If it's still in progress, please leave a comment or remove the `stale` label.
            Otherwise, it will be automatically closed in 7 days.
          close-pr-message: >
            🔒 This PR was automatically closed due to inactivity.
            If the changes are still relevant, you can reopen it or create a new one.

          # ── Exceptions ──────────────────────────────────────────────────────
          exempt-issue-labels: 'pinned,security,in-progress'
          exempt-pr-labels: 'pinned,security,in-progress'

          # Maximum operations per run (prevents exhausting the rate limit)
          operations-per-run: 100
